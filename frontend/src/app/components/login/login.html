<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card premium-card p-4 mt-5">
      <div class="card-body">
        <h2 class="text-center mb-4"><i class="bi bi-shield-lock text-primary"></i> Ingreso al Simulador</h2>
        <form (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label class="form-label">Correo Institucional</label>
            <input type="email" class="form-control" [(ngModel)]="credentials.correo" name="correo" placeholder="@cibertec.edu.pe" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" [(ngModel)]="credentials.password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Entrar
          </button>
          <p class="text-center">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
        </form>
      </div>
    </div>
  </div>
</div>

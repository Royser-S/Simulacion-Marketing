<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card premium-card p-4 mt-5">
      <div class="card-body">
        <h2 class="text-center mb-4"><i class="bi bi-person-plus text-primary"></i> Registro Institucional</h2>
        <form (ngSubmit)="onRegister()">
          <!-- El rol se asigna internamente como ESTUDIANTE -->
          <div class="mb-3 text-center">
            <span class="badge bg-soft-primary text-primary px-3 py-2 rounded-pill">Perfil Estudiante @cibertec.edu.pe</span>
          </div>
          <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" [(ngModel)]="user.nombreCompleto" name="nombreCompleto" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Correo Institucional (@cibertec.edu.pe)</label>
            <input type="email" class="form-control" [(ngModel)]="user.correo" name="correo" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" [(ngModel)]="user.password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Registrarme
          </button>
          <p class="text-center">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
        </form>
      </div>
    </div>
  </div>
</div>
